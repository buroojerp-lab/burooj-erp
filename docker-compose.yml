# ============================================================
# docker-compose.yml
# Burooj Heights ERP - Production (erp.buroojmarketing.com)
# ============================================================

version: '3.9'

services:

  # ── PostgreSQL Database ──
  postgres:
    image: postgres:16-alpine
    container_name: burooj_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: burooj_erp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - burooj_net

  # ── Backend API ──
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: burooj_api
    restart: unless-stopped
    env_file: ./backend/.env.production
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      NODE_ENV: production
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - burooj_net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (React) ──
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: https://erp.buroojmarketing.com/api/v1
    container_name: burooj_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - burooj_net

  # ── Nginx Reverse Proxy ──
  nginx:
    image: nginx:alpine
    container_name: burooj_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - burooj_net

volumes:
  postgres_data:
  uploads_data:
  nginx_logs:
  certbot_www:

networks:
  burooj_net:
    driver: bridge
